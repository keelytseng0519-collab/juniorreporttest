    const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
    const photoInput = document.getElementById("photoInput"), placeholderText = document.getElementById("placeholderText");
    let baseImage = null, circles = [], isDrawing = false, startX, startY;

    function redraw() {
      if(!baseImage) return;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(baseImage, 0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 6; ctx.strokeStyle = "red";
      circles.forEach(c => { ctx.beginPath(); ctx.ellipse(c.cx, c.cy, c.rx, c.ry, 0, 0, Math.PI*2); ctx.stroke(); });
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - rect.left) * (canvas.width / rect.width), y: (cy - rect.top) * (canvas.height / rect.height) };
    }

    canvas.addEventListener('mousedown', s => { if(!baseImage)return; isDrawing=true; let p=getPos(s); startX=p.x; startY=p.y; });
    canvas.addEventListener('touchstart', s => { if(!baseImage)return; isDrawing=true; let p=getPos(s); startX=p.x; startY=p.y; s.preventDefault(); }, {passive:false});
    window.addEventListener('mousemove', m => { if(!isDrawing)return; let p=getPos(m); redraw(); let cx=(startX+p.x)/2, cy=(startY+p.y)/2, rx=Math.abs(p.x-startX)/2, ry=Math.abs(p.y-startY)/2; ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.stroke(); });
    window.addEventListener('touchmove', m => { if(!isDrawing)return; let p=getPos(m); redraw(); let cx=(startX+p.x)/2, cy=(startY+p.y)/2, rx=Math.abs(p.x-startX)/2, ry=Math.abs(p.y-startY)/2; ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.stroke(); m.preventDefault(); }, {passive:false});
    window.addEventListener('mouseup', e => { if(!isDrawing)return; isDrawing=false; let p=getPos(e); let cx=(startX+p.x)/2, cy=(startY+p.y)/2, rx=Math.abs(p.x-startX)/2, ry=Math.abs(p.y-startY)/2; if(rx>5||ry>5)circles.push({cx,cy,rx,ry}); redraw(); updateBtns(); });
    window.addEventListener('touchend', e => { if(!isDrawing)return; isDrawing=false; let p=getPos(e.changedTouches[0]); let cx=(startX+p.x)/2, cy=(startY+p.y)/2, rx=Math.abs(p.x-startX)/2, ry=Math.abs(p.y-startY)/2; if(rx>5||ry>5)circles.push({cx,cy,rx,ry}); redraw(); updateBtns(); });

   // 優化後的注音生成函數
function getZWord(char, yin, tone) {
  // 1. 處理標點符號
  if (char && char.match(/[，。：；！？（）、]/)) {
    return `<span class="z-punctuation" style="font-size:1.6rem; margin:0 4px; vertical-align:middle;">${char}</span>`;
  }
  
  // 2. 處理非中文字元
  if (!char || !char.match(/[\u4e00-\u9fa5]/)) {
    return `<span style="font-family:sans-serif; margin:0 2px; font-weight:bold;">${char || ""}</span>`;
  }

  // 3. 聲調判定：對應 GAS 的數字指令
  let tHtml = "";
  let t = String(tone);
  if (t === "2") tHtml = '<span class="tone tone-2">ˊ</span>';
  else if (t === "3") tHtml = '<span class="tone tone-3">ˇ</span>';
  else if (t === "4") tHtml = '<span class="tone tone-4">ˋ</span>';
  else if (t === "0") tHtml = '<span class="tone tone-0">˙</span>';
  // 一聲 (t === "1") 不顯示符號

  // 4. 注音符號處理
  let vy = "";
  if (yin) {
    let cleanYin = String(yin).replace(/[ˊˇˋ˙]/g, "");
    for (let s of cleanYin) {
      vy += `<span class="yin-symbol">${s}</span>`;
    }
  }

  return `<span class="z-word"><span class="z-char">${char}</span><span class="z-yin">${vy}${tHtml}</span></span>`;
}

async function callGPTViaGAS(promptText) {
  // 在開始前給一個提示，確認按鈕有被觸發
  console.log("開始傳送至 AI..."); 

  try {
    // 1. 加入時間戳記避免 Safari 抓舊快取
    const finalUrl = gasUrl + (gasUrl.includes('?') ? '&' : '?') + 't=' + new Date().getTime();

    // 2. 正確的 fetch 寫法
    const res = await fetch(finalUrl, {
      method: 'POST',
      // Safari 必須要有這行，強制追蹤 GAS 的重定向
      redirect: 'follow', 
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify({ "promptText": promptText })
    });

    if (!res.ok) throw new Error("伺服器回應錯誤");

    const resultText = await res.text();
    
    // 3. 清理 AI 可能帶出的 Markdown 標籤並轉為 JSON
    let cleanJson = resultText.replace(/```json/g, '').replace(/```/g, '').trim();
    let data = JSON.parse(cleanJson);
    
    return data;
  } catch (e) {
    // 這是給 Safari 抓鬼用的警告
    console.error("連線出錯:", e);
    alert("連線失敗！\n1. 如果是 Safari，請檢查是否開啟了『私密瀏覽』\n2. 請確認網路是否通暢\n錯誤訊息：" + e.message);
    return null;
  }
}

      const prompt = `您是一位專業的國小記者導師。撰寫一篇具備新聞感的專業快報。要求：

      4. 總字數限制在 120-150 字。
      回傳 JSON：{"title": [{"c": "字", "y": "注音", "t": "聲調"}...], "body": [{"c": "字", "y": "注音", "t": "聲調"}...]}`;
      
      // 改為呼叫 GAS 函數
      return await callGPTViaGAS(prompt + `\n資訊：地點:${loc}, 問題:${prob}, 風險:${impact}, 建議:${sug}, 層面:${scope}`);
    }

    async function reZhuyinText(plainText) {
      const prompt = `將文字轉為台灣注音 JSON 陣列：${plainText}
      回傳格式：[{"c": "字", "y": "注音", "t": "聲調數字"}...]。禁止羅馬拼音。一聲聲調留空字串。`;
      
      // 改為呼叫 GAS 函數
      return await callGPTViaGAS(prompt);
    }

    // --- 報告流程 (不變) ---
    async function startReporting() {
      const reporter = document.getElementById('reporterName').value || "小記者";
      const team = document.getElementById('team').value || "未選組";
      const loc = document.getElementById('locationInput').value || "校園";
      const scope = Array.from(document.querySelectorAll('input[name="scope"]:checked')).map(cb => cb.value).join("、") || "校園安全";

      document.getElementById('rReporter').textContent = reporter + " (" + team + ")";
      document.getElementById('rTime').textContent = new Date().toLocaleString('zh-TW');
      document.getElementById('rImg').src = canvas.toDataURL();
      
      switchPage('page-preview');
      document.getElementById('report-final-container').style.opacity = "0.3";
      document.getElementById('ai-loading').style.display = 'block';
      setZLoadingText("ＡＩ撰寫中...");
      document.getElementById('newsContent').innerHTML = "";
      document.getElementById('rTitleContainer').innerHTML = "";

      const aiData = await generateAIContent(loc, document.getElementById('problemInput').value, document.getElementById('impactInput').value, document.getElementById('suggestionInput').value, reporter, scope);
      document.getElementById('ai-loading').style.display = 'none';
      document.getElementById('report-final-container').style.opacity = "1";

      if(aiData && aiData.title && aiData.body) {
        let th = ""; aiData.title.forEach(i => { th += getZWord(i.c, i.y, i.t); });
        document.getElementById('rTitleContainer').innerHTML = th;
        let bh = ""; aiData.body.forEach(i => { bh += getZWord(i.c, i.y, i.t); });
        document.getElementById('newsContent').innerHTML = bh;
        document.getElementById('manualEditContent').value = aiData.body.map(i => i.c).join("");
      } else {
        document.getElementById('newsContent').innerHTML = "AI 生成連線逾時，請檢查 GAS 或 OpenAI 額度。";
      }
    }

    // --- 事件綁定 (不變) ---
    document.getElementById('btnGoPreview').onclick = startReporting;
    document.getElementById('btnRetryAI').onclick = startReporting;
    document.getElementById('btnBackEditPreview').onclick = () => switchPage('page-edit');
    document.getElementById('btnManualEdit').onclick = () => document.getElementById('editArea').classList.toggle('hidden');

// --- 修改這一段：保存編輯並重新生成注音 ---
document.getElementById('btnSaveManual').onclick = async () => {
      const text = document.getElementById('manualEditContent').value;
      if (!text) return;

      document.getElementById('ai-loading').style.display = 'block';
      document.getElementById('report-final-container').style.opacity = "0.3";
      setZLoadingText("正在重新產生排版...");

      try {
        let response = await reZhuyinText(text);
        
        // 1. 清理字串髒資料 (預防萬一)
        if (typeof response === 'string') {
          response = JSON.parse(response.replace(/```json/g, '').replace(/```/g, '').trim());
        }
        
        document.getElementById('ai-loading').style.display = 'none';
        reportContainer = document.getElementById('report-final-container');
        reportContainer.style.opacity = "1";

        // 2. 關鍵相容性判斷：
        // 手動修改時，我們改從 response.body 拿資料
        let finalData = null;
        if (Array.isArray(response)) {
          finalData = response;
        } else if (response.body && Array.isArray(response.body)) {
          finalData = response.body;
        } else if (response.title && Array.isArray(response.title)) {
          finalData = response.title;
        }

        if (finalData) {
          let html = "";
          finalData.forEach(item => { 
            html += getZWord(item.c, item.y, item.t); 
          });
          document.getElementById('newsContent').innerHTML = html;
          document.getElementById('editArea').classList.add('hidden');
        } else {
          throw new Error("找不到內容陣列");
        }
      } catch (error) {
        console.error("保存失敗:", error);
        document.getElementById('ai-loading').style.display = 'none';
        document.getElementById('report-final-container').style.opacity = "1";
        alert("注音生成格式有誤，請嘗試點擊「AI重新生成」或是減少文字量再試一次。");
      }
    };

document.getElementById('btnDownload').onclick = async () => {
      const reportDiv = document.getElementById('report');
      // 1. 隱藏不必要的按鈕介面
      document.getElementById('editArea').classList.add('hidden');
      document.getElementById('controlPanel').style.display = 'none';
      document.getElementById('btnBackEditPreview').style.display = 'none';

      try {
        // 2. 轉化為畫布
        const s = await html2canvas(reportDiv, { 
          scale: 3, 
          useCORS: true, 
          backgroundColor: "#ffffff", 
          width: 794, 
          height: 1123 
        });
        const imgData = s.toDataURL("image/png");

        // 3. 判斷是否為手機 (解決手機下載沒反應的問題)
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
          // 手機版：彈出新分頁顯示圖片，引導使用者長按儲存
          const newWin = window.open();
          newWin.document.write(`
            <body style="margin:0; text-align:center; background:#333; color:white; font-family:sans-serif;">
              <p style="padding:20px;">📷 報導已生成！<br>請【長按圖片】選擇「儲存圖片」</p>
              <img src="${imgData}" style="max-width:100%; height:auto; box-shadow:0 0 20px rgba(0,0,0,0.5);">
              <br><br>
              <button onclick="window.close()" style="padding:10px 20px; border-radius:10px; border:none; background:#555; color:white;">關閉預覽</button>
            </body>
          `);
        } else {
          // 電腦版：維持原本的自動下載
          const a = document.createElement("a");
          a.href = imgData;
          a.download = `小記者生活快報_${new Date().getTime()}.png`;
          a.click();
        }
      } catch (e) { 
        console.error(e); 
        alert("圖片生成失敗，請檢查網路或稍後再試。");
      }

      // 4. 恢復介面顯示
      document.getElementById('controlPanel').style.display = 'block';
      document.getElementById('btnBackEditPreview').style.display = 'inline-flex';
    };

function setupMic(btnId, inputId) {
  const btn = document.getElementById(btnId);
  const input = document.getElementById(inputId);
  btn.onclick = () => {
    const Speech = window.webkitSpeechRecognition || window.SpeechRecognition;
    if (!Speech) return;
    const r = new Speech();
    r.lang = 'zh-TW';
    r.continuous = false; // 確保辨識一段後自動停止
    r.onstart = () => btn.classList.add('recording');
    r.onend = () => btn.classList.remove('recording');
    r.onresult = (e) => {
      input.value = e.results[0][0].transcript;
      r.stop(); // 👈 填入文字後立刻強制關閉麥克風
    };
    r.start();
  };
}
    setupMic("btnMicLocation", "locationInput"); setupMic("btnMicProblem", "problemInput"); setupMic("btnMicImpact", "impactInput"); setupMic("btnMicSuggestion", "suggestionInput");
  </script>
